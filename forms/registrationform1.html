<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Universe travel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="card bg-dark text-light justify-content:center align-item:center shadow-lg rounded-4 p-4"
    style="max-width:460px; width:100%;">
        

    <div class="text-center mb-4">
        <h2 class="fw-bold text-info">Universe Travel Resistration</h2>
        <p class="text-light">
            Register to explore another planet
        </p>
    </div>
    <form>
        <div class="row">
            <div class="col-12 mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Enter your name">
            </div>
            <div class="col-12 mb-3">
                <label class="form-label">Email</label>
                <input type="text" class="form-control" placeholder="Enter your age">
            </div>
            <div class="col-12 mb-3">
                <label class="form-label">Age</label>
                <input type="email" class="form-control" placeholder="Enter your Email">
            </div>
            <div class="col-12 mb-3">
                <label class="form-label fw-bold">Mobile Number</label>
                <input type="tel" class="form-control">
            </div>
            <div class="col-12 mb-3">
                <label class="form-label">Choose your Planet</label>
                <select class="form-select">
                    <option selected>select planet</option>
                    <option>Mercury</option>
                    <option>Venus</option>
                    <option>Earth</option>
                    <option>Mars</option>
                    <option>Jupiter</option>
                    <option>Saturn</option>
                    <option>Uranus</option>
                    <option>Neptune</option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-control">Mission Type</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="mission">
                    <label class="form-check-label">
                        Research Mission
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="mission">
                    <label class="form-check-label">
                        Tourisum
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="mission">
                    <label class="form-check-label">
                        colonization
                    </label>
                </div>
            </div>
            <div class="col-12 mb-3">
                <label class="form-label">
                    Special Requirement
                </label>
                <textarea class="form-control" rows="3"
                placeholder="Write Your mission Details...."></textarea>
            </div>
            <div class="col-12 mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">
                        I agree to follow all space travel rules.
                    </label>

                </div>
            </div>
            <div class="d-grid">
                <button class="btn btn-info btn-lg">
                    <i class="bi bi-rocket-takeoff-fill"></i>
                    Launch Registration
                </button>
            </div>
        </div>
    </form>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
