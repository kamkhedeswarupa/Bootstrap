<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="/Header1/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container d-flex align-items-center">
        <div class="row align-items-center">
            <div class="col-md-6">

                <p class="text-center bg-warning mt-3 mb-3 p-2 px-2 rounded text-white ">Coffee | Happy | Enjoy</p>

                <h1 style="color:rgb(201, 123, 22);">Sunset Coffee House</h1>
                <p class="text-dark muted mt-4 ">Discover the perfect blend of quality, comfort, and flavor at our shop.
                    From handcrafted espresso drinks to freshly baked pastries,
                    we serve every order with care to make every visit memorable.</p>
                <button class="btn btn-lg btn-outline-dark me-5">add to cart</button>
                <button class="btn btn-lg btn-danger">order now</button>
            </div>
            <div class="col-md-6">
                <img src="/Header1/coffee.png" alt="coffee image" class="image-fluid">
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
