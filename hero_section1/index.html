<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap hero section</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg py-1">
        <div class="container">
            <a class="navbar-brand fw-bold fs-2" href="#">
                <span class="text-white">CRICKET</span>
                <span class="text-warning">WORLD</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbar">
                <ul class="navbar-nav gap-4 ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">HOME</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#">MATCHES</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#">TEAMS</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#">PLAYERS</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="#">NEWS</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#">GALLARY</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="btn btn-danger px-4">LIVE</a>
                    </li>
                </ul>

                <a href="#" class="text-white fs-4">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </a>

            </div>
        </div>
    </nav>
    <section class="hero">
    
        <div class="container">
            <div class="row align-items-center">

                <div class="col-lg-3 text-center mb-1">
                    <img src="ind.png" class="img-fluid" alt="India Player">


                </div>
                <div class="col-lg-6 text-center text-white">
                    <h5 class="experience">- EXPERIENCE -</h5>
                    <h1 class="display-1 fw-bold">THE THRILL OF<br>
                        <span class=" display-2 text-warning">LIVE CRICKET</span>
                    </h1>
                    <p class="lead mt-4">stay updated with live scores,ball-by-ball commentry,<br>
                        players stats,match highlights and much more.</p>

                    <div class="mt-4 d-flex justify-content-center gap-4">
                        <a href="#" class="btn btn-primary btn-lg px-5 py-2">
                            <i class="fa-solid fa-play me-2"></i>WATCH MORE
                        </a>
                        <a href="#" class="btn btn-outline-light  px-5 py-2">
                            <i class="fa-solid fa-clapperboard me-2"></i>HIGHLIGHTS
                        </a>
                    </div>
                    <div class="match mt-5">
                        <h2 class="fw-bold">
                            INDIA <span class="text-warning mx-4">VS</span>ENGLAND
                        </h2>
                        <button class="btn btn-danger btn-lg mt-3">LIVE TODAY</button>
                    </div>
                </div>
                <div class="col-lg-3 text-center text-white">
                    <img src="eng.png" class="img-fluid" alt="England Player">
                </div>
            </div>
        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
